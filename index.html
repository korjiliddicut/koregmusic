<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kore-G | Sample Packs</title>
  <meta name="description" content="Psytrance & bass music sample packs by Kore-G. Used by Vini Vici, Reinier Zonneveld & Indira Paganotto.">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

  
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="/">
        <img src="/images/kore26.gif">
      </a>
      <button class="nav-toggle" aria-label="Menu" onclick="toggleNav()">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="/" class="active">Home</a></li>
        <li><a href="/sample-packs/" rel="noopener">Sample Packs</a></li>
        <li><a href="/about/">About</a></li>
      </ul>
    </div>
  </nav>
<main>
  
  <model-viewer
    id="hero-model"
    src="/models/kore-26.glb"
    alt="Kore-G 3D object"
    interaction-prompt="none"
    camera-orbit="0deg 80deg 105%"
    style="width: 100%; height: 420px; background-color: transparent;">
  </model-viewer>
  
</main>

<footer>
  <div class="footer-inner">
    <ul class="footer-social">
      <li><a href="https://www.instagram.com/koregmusic/" target="_blank" rel="noopener">Instagram</a></li>
      <li><a href="https://www.youtube.com/@koregmusic" target="_blank" rel="noopener">YouTube</a></li>
      <li><a href="https://www.tiktok.com/@koregmusic" target="_blank" rel="noopener">TikTok</a></li>
    </ul>
    <p>&copy; 2026 Kore-G. All rights reserved.</p>
    <ul class="footer-links">
      <li><a href="/about/">About</a></li>
      <li><a href="/refund-policy/">Refund Policy</a></li>
      <li><a href="/privacy-policy/">Privacy Policy</a></li>
    </ul>
  </div>
</footer>

<script>
  const heroModel = document.getElementById('hero-model');
  window.addEventListener('mousemove', (e) => {
    if (!heroModel) return;   // safety: do nothing if the model isn't on the page
    const x = (e.clientX / window.innerWidth) * 2 - 1;
    const y = (e.clientY / window.innerHeight) * 2 - 1;
    const theta = x * 15;
    const phi = 80 + y * 8;
    heroModel.cameraOrbit = `${theta}deg ${phi}deg 105%`;
  });
</script>
  
<script>
  function toggleNav() {
    document.getElementById('nav-links').classList.toggle('open');
  }
</script>

</body>
</html>
